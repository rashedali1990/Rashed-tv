<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Smarters Style</title>
    <link rel="stylesheet" href="style.css">
    <!-- مكتبة Hls.js لتشغيل M3U8 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- أيقونات Font Awesome للتنقل السفلي -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- === شريط التنقل السفلي الثابت (مثل IPTV Smarters) === -->
    <nav class="bottom-nav">
        <a href="#live" class="nav-item active" data-tab="channels">
            <i class="fa-solid fa-tv"></i>
            <span>مباشر</span>
        </a>
        <a href="#movies" class="nav-item" data-tab="movies">
            <i class="fa-solid fa-film"></i>
            <span>أفلام</span>
        </a>
        <a href="#series" class="nav-item" data-tab="series">
            <i class="fa-solid fa-book-open"></i>
            <span>مسلسلات</span>
        </a>
        <a href="#catchup" class="nav-item" data-tab="catchup">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Catch-Up</span>
        </a>
        <a href="#settings" class="nav-item" data-tab="settings">
            <i class="fa-solid fa-gear"></i>
            <span>الإعدادات</span>
        </a>
    </nav>

    <!-- === container الرئيسي للمحتوى === -->
    <div id="appContainer" class="app-container">
        <!-- === شاشة البروفايلات (الإعدادات) === -->
        <section id="settingsScreen" class="screen active">
            <div class="settings-header">
                <h2>إدارة البروفايلات</h2>
                <button class="btn-back" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i>返回</button>
            </div>
            
            <div class="settings-content">
                <!-- نموذج إضافة بروفايل جديد -->
                <form id="profileForm" class="profile-form">
                    <h3>إضافة بروفايل جديد</h3>
                    
                    <div class="form-group">
                        <label for="profileName">اسم البروفايل:</label>
                        <input type="text" id="profileName" placeholder="مثلاً: اشتراكي المنزلي" required>
                    </div>
                    
                    <!-- تبديل طريقة الاتصال -->
                    <div class="method-toggle">
                        <button type="button" id="btnM3u" class="method-btn active" data-method="m3u">رابط M3U مباشر</button>
                        <button type="button" id="btnXtream" class="method-btn" data-method="xtream">خادم Xtream Codes</button>
                    </div>
                    
                    <!-- قسم M3U -->
                    <div id="m3uSection" class="input-section active">
                        <div class="form-group">
                            <label for="m3uUrl">رابط M3U:</label>
                            <input type="url" id="m3uUrl" placeholder="مثال: http://example.com/playlist.m3u8" required>
                        </div>
                    </div>
                    
                    <!-- قسم Xtream -->
                    <div id="xtreamSection" class="input-section">
                        <div class="form-group">
                            <label for="xtreamHost">عنوان الخادم:</label>
                            <input type="url" id="xtreamHost" placeholder="مثال: http://panel.example.com:80" required>
                        </div>
                        <div class="form-group">
                            <label for="xtreamUser">اسم المستخدم:</label>
                            <input type="text" id="xtreamUser" placeholder="مثال: user123" required>
                        </div>
                        <div class="form-group">
                            <label for="xtreamPass">كلمة المرور:</label>
                            <input type="password" id="xtreamPass" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-primary">حفظ وتفعيل البروفايل</button>
                </form>
                
                <!-- قائمة البروفايلات المحفوظة -->
                <div class="profiles-list">
                    <h3>البروفايلات المحفوظة</h3>
                    <div id="profileList" class="profile-list">
                        <!-- سيتم تعبئته بواسطة JavaScript -->
                    </div>
                    <button id="clearAllBtn" class="btn-danger">مسح جميع البروفايلات</button>
                </div>
            </div>
        </section>

        <!-- === شاشات المحتوى (مباشر، أفلام، مسلسلات، catch-up) === -->
        <section id="contentScreen" class="screen">
            <!-- شريط الفئات الأفقي المتحرك -->
            <div class="category-scroller">
                <div class="category-track">
                    <!-- سيتم تعبئة الفئات بواسطة JavaScript -->
                </div>
            </div>
            
            <!-- شبكة المحتوى -->
            <div id="contentGrid" class="content-grid">
                <!-- سيتم تعبئة البطاقات بواسطة JavaScript -->
            </div>
            
            <!-- حالة عدم وجود محتوى -->
            <div id="emptyState" class="empty-state">
                <i class="fa-solid fa-circle-info"></i>
                <p>لا يوجد محتوى مت
